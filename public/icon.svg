<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Tempest dashboard icon — copper square with a wind/temperature
       glyph. Single SVG file does double duty: serves as the PWA
       manifest icon (sizes="any" so Android/Chrome use it for any
       requested size) and the browser favicon. -->
  <rect width="512" height="512" rx="96" fill="#cf7f4e"/>
  <!-- Stylized "T" — large white glyph centered. Sans-serif, bold,
       optical-center adjusted slightly upward so the visual weight
       sits in the middle of the tile. -->
  <text x="256" y="360"
        font-family="-apple-system, system-ui, 'Segoe UI', sans-serif"
        font-size="320"
        font-weight="700"
        fill="#ffffff"
        text-anchor="middle"
        letter-spacing="-12">T</text>
</svg>
